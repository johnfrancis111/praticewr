<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main">

        <div class="intro">
            <h2>Hello world</h2>
            <p>This is my first webpage.</p>
            <p>We are a small web development team focused on building simple and useful websites for our clients.</p>
        </div>

        <div class="card">
            <img src="Cool-Anime-Wallpapers.jpg" alt="Profile">
            <h1>Nnopuechi Johnfrancis</h1>
            <p>Web Developer</p>
        </div>

        <form class="form">
            <h3>Contact Form</h3>

            <label>Full Name:</label>
            <input type="text" name="name" required>

            <label>Gender:</label>
            <input type="text" name="gender" required>

            <label>Email:</label>
            <input type="email" name="email" required>

            <label>Password:</label>
            <input type="password" name="password" required>
        </form>

    </div>

</body>
</html>
